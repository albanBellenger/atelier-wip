# Override: only Postgres + MinIO in Docker; run API and/or UI on the host (hot reload).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d db storage
# Then: cd backend && uvicorn app.main:app --reload
#       cd frontend && npm run dev
#
# To run the frontend container against a host-backed API (backend on :8000):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml run --rm -p 5173:5173 \
#     -e ATELIER_API_PROXY=http://host.docker.internal:8000 frontend
#
# To run the backend on the host against Docker-only Postgres + MinIO:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d db storage
# Set MINIO_ENDPOINT=127.0.0.1:9000 (and matching MINIO_ROOT_* / MINIO_BUCKET) in backend `.env`
# when connecting to MinIO published on localhost:9000.
#
# `backend` and `frontend` use profile `donotstart` so a plain `up` with this file only starts db + storage.

services:
  backend:
    profiles:
      - donotstart
  frontend:
    profiles:
      - donotstart
