# Production-oriented overrides (restart policies, resource hints, health checks).
# Use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Before first deploy, run database migrations once (example):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm backend \
#     sh -c "alembic upgrade head && exit 0"
# Then start the stack without re-running migrations on every boot (backend `command` below).
#
# Frontend image is built with Dockerfile.prod. Set VITE_API_BASE_URL to the **browser-reachable**
# API origin (e.g. https://api.example.com) when building — see `.env.production.example`.

services:
  db:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  storage:
    restart: unless-stopped

  backend:
    restart: unless-stopped
    environment:
      ENV: production
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes: []
    ports:
      - "${FRONTEND_PUBLISH_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
